[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cognitive-runtime"
version = "0.1.0"
description = "Continuous Cognitive Runtime: an always-running cognitive system that inhabits interactive worlds (Minecraft SurvivalBox MVP)"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
# numpy is core: pixel frames flow as arrays from the backend/bridge boundary
# through fusion, the binary frame store and the recorder, whether or not
# torch (the neural extra) is installed.  PyYAML is core: reward profiles
# (issue #41, --reward-profile) are the one place YAML is the primary format.
# namesgenerator is core: the organism's default name (issue #88,
# RuntimeConfig.resolve_name) is generated from it; zero transitive deps.
# crafter is core (issue #176): it's the CLI's default `--world` and the live
# V2 nursery, so a base install must be able to run the documented default
# `ccr run`/`ccr nursery run` path without an extra; its own deps (imageio,
# numpy, opensimplex, pillow, ruamel.yaml) are all lightweight, pure-Python.
# The legacy Minecraft survival economy needs none of this -- `--world
# minecraft` never imports `programs.crafter`.
dependencies = ["numpy>=1.23", "PyYAML>=6", "namesgenerator>=0.3", "crafter>=1.8,<2"]

[project.optional-dependencies]
dev = ["pytest>=7"]
# Neural pixel vision (end-to-end behavioral cloning). Optional: the whole
# pure-Python stack (loop, streams, simulated/remote backends, the linear BC
# trainer and every heuristic encoder) runs without it. Only the pixel CNN,
# its trainer and the neural policy import torch, always lazily.
neural = ["torch>=2"]

[project.scripts]
ccr = "cognitive_runtime.cli:main"

[tool.setuptools.packages.find]
include = ["cognitive_runtime*", "brain*", "sleep*", "motor*", "development*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
